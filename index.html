<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Algoritmo de Bresenham</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap');

/* Paleta de colores */
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --pixel:     #58a6ff;
      --grid:      rgba(48,54,61,0.6);
      --axis:      #444c56;
      --tick-lbl:  #8b949e;
    }

     * { box-sizing: border-box; margin: 0; padding: 0; } 

    body {
      background: var(--bg); /* Fondo oscuro */
      color: var(--text);    /* Texto claro para contraste */
      font-family: 'Barlow', sans-serif; /* Tipografía moderna y legible */
      min-height: 100vh;  /* Asegura que el fondo cubra toda la pantalla */
      display: flex; /* Usamos flexbox para centrar el contenido */
      flex-direction: column; /* Apilamos los elementos verticalmente */
      align-items: center; /* Centra horizontalmente */
      padding: 32px 16px 48px; /* Espaciado alrededor del contenido */
      gap: 28px; /* Espacio entre los elementos */
    }
    /* Estilos para el título */
     h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.5rem;
      color: var(--accent);
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      width: 100%;
      max-width: 980px;
    }
   
     h1 span { color: var(--accent2); }

    /* ── Panel de controles ── */
    .controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 28px;
      display: flex;
      align-items: flex-end;
      gap: 24px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 980px;
    }
    
    /* Estilos para los campos de entrada */
   .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
/* Estilos para las etiquetas de los campos */

  .label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
