<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Algoritmo de Bresenham</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap');

/* Paleta de colores */
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --pixel:     #58a6ff;
      --grid:      rgba(48,54,61,0.6);
      --axis:      #444c56;
      --tick-lbl:  #8b949e;
    }

     * { box-sizing: border-box; margin: 0; padding: 0; } 

    body {
      background: var(--bg); /* Fondo oscuro */
      color: var(--text);    /* Texto claro para contraste */
      font-family: 'Barlow', sans-serif; /* Tipografía moderna y legible */
      min-height: 100vh;  /* Asegura que el fondo cubra toda la pantalla */
      display: flex; /* Usamos flexbox para centrar el contenido */
      flex-direction: column; /* Apilamos los elementos verticalmente */
      align-items: center; /* Centra horizontalmente */
      padding: 32px 16px 48px; /* Espaciado alrededor del contenido */
      gap: 28px; /* Espacio entre los elementos */
    }
    /* Estilos para el título */
     h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.5rem;
      color: var(--accent);
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      width: 100%;
      max-width: 980px;
    }
   
     h1 span { color: var(--accent2); }

    /* ── Panel de controles ── */
    .controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 28px;
      display: flex;
      align-items: flex-end;
      gap: 24px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 980px;
    }
    
    /* Estilos para los campos de entrada */
   .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
/* Estilos para las etiquetas de los campos */

  .label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
  /* Estilos para los campos de entrada numéricos */
  input[type="number"] {
      width: 80px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      padding: 6px 10px;
      outline: none;
      transition: border-color .2s;
    }
  /* Cambia el color del borde al enfocar el campo de entrada */
  input[type="number"]:focus { border-color: var(--accent); }
     button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 5px;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 8px 22px;
      cursor: pointer;
      transition: opacity .2s;
      height: 36px;
      align-self: flex-end;
    }
    button:hover { opacity: .85; }
    /* ── Canvas wrapper con etiquetas de eje ── */
    .canvas-wrapper {
      position: relative;
      /* El canvas ocupa el interior; dejamos espacio para las etiquetas */
      padding-left: 44px;   /* ancho del eje Y */
      padding-bottom: 28px; /* alto del eje X */
    }

    canvas#grid {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    /* Etiquetas del eje Y (izquierda) */
    #axisY {
      position: absolute;
      left: 0;
      top: 0;
      width: 40px;
      height: var(--canvas-h, 400px); /* se asigna por JS */
      display: flex;
      flex-direction: column-reverse; /* 0 abajo, max arriba */
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 4px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--tick-lbl);
      pointer-events: none;
    }

    /* Etiquetas del eje X (inferior) */
    #axisX {
      position: absolute;
      bottom: 0;
      left: 44px;
      width: var(--canvas-w, 600px); /* se asigna por JS */
      height: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 2px 0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--tick-lbl);
      pointer-events: none;
    }
   /* ── Tabla de pasos ── */
    .table-section {
      width: 100%;
      max-width: 980px;
    }

    .table-section h2 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      color: var(--accent2);
      margin-bottom: 10px;
      letter-spacing: 0.06em;
    }

    .table-scroll {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
    }

    thead tr {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
    }

    th {
      padding: 10px 14px;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
 /* Estilos para las filas de la tabla, con alternancia de colores y resaltado */
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }

    tbody tr:nth-child(even) { background: var(--surface); }
    tbody tr:nth-child(odd)  { background: #0d1117; }

    tbody tr.highlight { background: rgba(88,166,255,0.12) !important; }

    td {
      padding: 7px 14px;
      text-align: center;
      color: var(--text);
    }
    td.plot-cell { color: var(--accent2); font-weight: 700; }
    td.err-cell  { color: #f0883e; }
 
 </style>
</head>
<body>

  <h1>Algoritmo de <span>Bresenham</span> — Trazado de Línea</h1>

  <!-- ── Controles de entrada ── -->
  <div class="controls">
    <div class="field">
      <label>X₀</label>
      <input type="number" id="x0" value="2">
    </div>
    <div class="field">
      <label>Y₀</label>
      <input type="number" id="y0" value="3">
    </div>
    <div class="field">
      <label>X₁</label>
      <input type="number" id="x1" value="12">
    </div>
    <div class="field">
      <label>Y₁</label>
      <input type="number" id="y1" value="8">
    </div>
    <button onclick="run()">Trazar</button>
  </div>

  <!-- ── Canvas + ejes numéricos ── -->
  <div class="canvas-wrapper" id="canvasWrapper">
    <div id="axisY"></div>
    <canvas id="grid"></canvas>
    <div id="axisX"></div>
  </div>

  <!-- ── Tabla de pasos ── -->
  <div class="table-section">
    <h2>// Tabla de pasos del algoritmo</h2>
    <div class="table-scroll">
      <table id="stepTable">
        <thead>
          <tr>
            <th>Paso</th>
            <th>x</th>
            <th>y</th>
            <th>err</th>
            <th>Observación</th>
          </tr>
        </thead>
        <tbody id="stepBody"></tbody>
      </table>
    </div>
  </div>

<script>
